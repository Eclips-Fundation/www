<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Versiones · Eclips Chat para Android</title>
    <meta name="description" content="Descarga todas las versiones de Eclips Chat: release, preview, beta y alpha. Cada versión tiene un nivel de soporte específico.">
    <!-- Google Fonts + Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0C10;
            color: #EFF3F8;
            line-height: 1.5;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1E1F24;
        }
        ::-webkit-scrollbar-thumb {
            background: #F97316;
            border-radius: 8px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.25rem;
        }

        /* Header optimizado móvil */
        .header {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
            margin-bottom: 1.5rem;
            position: sticky;
            top: 0;
            background: rgba(10, 12, 16, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .logo a {
            font-size: 1.35rem;
            font-weight: 700;
            text-decoration: none;
            color: #EFF3F8;
            letter-spacing: -0.3px;
        }
        
        .logo .gradient-chat {
            background: linear-gradient(135deg, #FFB347, #F95A2C);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #F97316;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
            padding: 0.4rem 0.9rem;
            border-radius: 40px;
            background: rgba(249, 115, 22, 0.1);
            cursor: pointer;
        }

        .back-link:active {
            transform: scale(0.96);
            background: rgba(249, 115, 22, 0.2);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header p {
            color: #A0A8B8;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* Badges responsive */
        .status-badge, .support-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.75rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        .status-release {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
        .status-preview {
            background: rgba(249, 115, 22, 0.2);
            color: #F97316;
            border: 1px solid rgba(249, 115, 22, 0.3);
        }
        .status-beta {
            background: rgba(168, 85, 247, 0.2);
            color: #c084fc;
            border: 1px solid rgba(192, 132, 252, 0.3);
        }
        .status-alpha {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .support-supported {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }
        .support-missing_features {
            background: rgba(249, 115, 22, 0.15);
            color: #F97316;
            border: 1px solid rgba(249, 115, 22, 0.3);
        }
        .support-deprecated {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .support-not_supported {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        /* Versions grid - optimizado móvil */
        .versions-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .version-card {
            background: #12141C;
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid #252A33;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .version-card:active {
            transform: scale(0.99);
        }

        .version-card.not-supported-card {
            opacity: 0.7;
            border-color: #DC2626;
        }

        .version-info {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .version-number {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #FFE6D5, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .badges-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .version-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
            font-size: 0.7rem;
            color: #8B95A8;
        }

        .version-meta i {
            color: #F97316;
            width: 14px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.7rem 1.2rem;
            background: linear-gradient(105deg, #F97316, #FF8C42);
            border-radius: 60px;
            color: #0A0C10;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .download-btn:active {
            transform: scale(0.97);
        }

        .download-btn.disabled-btn {
            background: #2A2E3A;
            color: #6A7287;
            cursor: not-allowed;
            opacity: 0.6;
            pointer-events: none;
        }

        .support-tooltip {
            position: relative;
            cursor: help;
        }

        /* Loading & Empty states */
        .loading-state, .empty-state, .error-state {
            text-align: center;
            padding: 3rem 1.5rem;
            background: #12141C;
            border-radius: 28px;
            border: 1px solid #252A33;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #252A33;
            border-top-color: #F97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer móvil */
        .footer {
            border-top: 1px solid rgba(249, 115, 22, 0.2);
            padding: 1.5rem 0;
            margin-top: 2rem;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            text-align: center;
        }

        .copyright {
            font-size: 0.7rem;
            color: #7F8899;
        }

        .footer-links {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-links a {
            color: #B9C1D1;
            text-decoration: none;
            font-size: 0.75rem;
        }

        .retry-btn {
            background: rgba(249, 115, 22, 0.2);
            border: 1px solid #F97316;
            color: #F97316;
            margin-top: 1rem;
        }

        /* Mejoras táctiles */
        button, .back-link, .download-btn {
            touch-action: manipulation;
        }

        /* Tablet y desktop */
        @media (min-width: 640px) {
            .container {
                padding: 0 1.8rem;
            }
            .version-card {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 1.2rem 1.5rem;
            }
            .version-info {
                flex-direction: row;
                align-items: center;
                flex-wrap: wrap;
                gap: 1rem;
                flex: 2;
            }
            .version-number {
                font-size: 1.5rem;
                min-width: 100px;
            }
            .download-btn {
                width: auto;
                min-width: 150px;
            }
            .badges-group {
                flex-wrap: nowrap;
            }
            .footer-content {
                flex-direction: row;
                justify-content: space-between;
                text-align: left;
            }
            h1 {
                font-size: 2.2rem;
            }
        }

        @media (min-width: 1024px) {
            .container {
                padding: 0 2rem;
            }
            h1 {
                font-size: 2.5rem;
            }
            .version-number {
                font-size: 1.6rem;
            }
        }

        /* Ajustes extra para móviles muy pequeños */
        @media (max-width: 480px) {
            .version-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.4rem;
            }
            .badges-group {
                flex-direction: column;
                align-items: flex-start;
            }
            .status-badge, .support-badge {
                white-space: normal;
                font-size: 0.65rem;
            }
            .logo a {
                font-size: 1.2rem;
            }
            .back-link {
                font-size: 0.8rem;
                padding: 0.35rem 0.8rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="nav">
            <div class="logo">
                <a href="#" id="logoHomeLink">Eclips <span class="gradient-chat">Chat</span></a>
            </div>
            <div class="back-link" id="backToHome">
                <i class="fas fa-arrow-left"></i> Volver
            </div>
        </div>
    </div>

    <div class="page-header">
        <h1><i class="fas fa-download" style="color:#F97316; margin-right: 0.6rem; font-size: 1.8rem;"></i> Todas las versiones</h1>
        <p>Descarga versiones de Eclips Chat. Cada versión tiene un nivel de soporte indicado con su respectivo icono.</p>
    </div>

    <div id="versionsContainer">
        <div class="loading-state">
            <div class="spinner"></div>
            <p>Cargando versiones...</p>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <div class="footer-content">
            <div class="copyright">
                <i class="far fa-copyright"></i> 2025 Eclips Chat — Cifrado E2EE para Android
            </div>
            <div class="footer-links">
                <a href="#">Política de Privacidad</a>
                <a href="#">Términos de Servicio</a>
                <a href="#">Soporte</a>
            </div>
        </div>
    </div>
</footer>

<script>
    const VERSIONS_JSON_URL = './versions.json';
    
    function getStatusInfo(status) {
        const statusMap = {
            release: { class: 'status-release', icon: 'fa-check-circle', label: 'Release' },
            preview: { class: 'status-preview', icon: 'fa-eye', label: 'Preview' },
            beta: { class: 'status-beta', icon: 'fa-flask', label: 'Beta' },
            alpha: { class: 'status-alpha', icon: 'fa-code-branch', label: 'Alpha' }
        };
        return statusMap[status] || { class: 'status-preview', icon: 'fa-tag', label: status };
    }

    function getSupportInfo(supportType) {
        const supportMap = {
            supported: {
                class: 'support-supported',
                icon: 'fa-check-circle',
                label: 'Soportado',
                tooltip: 'Versión completamente soportada con todas las funcionalidades actuales.',
                downloadable: true
            },
            missing_features: {
                class: 'support-missing_features',
                icon: 'fa-star-of-life',
                label: 'Funcionalidades limitadas',
                tooltip: 'Algunas funcionalidades no están disponibles comparado con versiones recientes.',
                downloadable: true
            },
            deprecated: {
                class: 'support-deprecated',
                icon: 'fa-exclamation-triangle',
                label: 'Obsoleto',
                tooltip: 'Esta versión aún funciona pero puede romperse en el futuro. Sin soporte.',
                downloadable: true
            },
            not_supported: {
                class: 'support-not_supported',
                icon: 'fa-times-circle',
                label: 'No soportado',
                tooltip: 'Versión no compatible. No se puede descargar.',
                downloadable: false
            }
        };
        return supportMap[supportType] || supportMap.not_supported;
    }

    function formatDate(dateString) {
        if (!dateString) return null;
        try {
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return null;
            return date.toLocaleDateString('es-ES', { year: 'numeric', month: 'short', day: 'numeric' });
        } catch (e) {
            return null;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(message, isError = false) {
        const existingToast = document.querySelector('.custom-toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'custom-toast';
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = isError ? '#DC2626' : '#F97316';
        toast.style.color = '#0A0C10';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '50px';
        toast.style.fontWeight = '500';
        toast.style.zIndex = '10000';
        toast.style.fontSize = '0.8rem';
        toast.style.backdropFilter = 'blur(8px)';
        toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
        toast.style.fontFamily = 'Inter, sans-serif';
        toast.style.maxWidth = '85%';
        toast.style.textAlign = 'center';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 400);
        }, 2500);
    }

    function showDownloadToast(version) {
        showToast(`📲 Descargando Eclips Chat ${version}...`);
    }

    function goToHomePage() {
        window.location.href = 'index.html';
    }

    function renderVersions(versions) {
        const container = document.getElementById('versionsContainer');
        if (!versions || versions.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open" style="font-size: 2.5rem; color:#F97316; margin-bottom: 1rem; display: block;"></i>
                    <h3 style="font-size: 1.3rem;">No hay versiones</h3>
                    <p style="color: #A0A8B8; font-size: 0.85rem;">Pronto habrá versiones disponibles.</p>
                    <button id="retryEmptyBtn" class="download-btn retry-btn" style="margin-top: 1rem; width: auto; padding: 0.6rem 1.2rem;"><i class="fas fa-sync-alt"></i> Reintentar</button>
                </div>
            `;
            const retryBtn = document.getElementById('retryEmptyBtn');
            if (retryBtn) retryBtn.addEventListener('click', () => loadVersionsFromServer());
            return;
        }

        const statusOrder = { release: 0, preview: 1, beta: 2, alpha: 3 };
        const sortedVersions = [...versions].sort((a, b) => {
            const orderDiff = statusOrder[a.status] - statusOrder[b.status];
            if (orderDiff !== 0) return orderDiff;
            return b.version.localeCompare(a.version, undefined, { numeric: true });
        });

        const versionsHtml = sortedVersions.map(v => {
            const statusInfo = getStatusInfo(v.status);
            const supportType = v.support_type || 'not_supported';
            const supportInfo = getSupportInfo(supportType);
            const formattedDate = v.release_date ? formatDate(v.release_date) : null;
            const sizeDisplay = v.size_mb ? `${v.size_mb} MB` : '— MB';
            const versionDisplay = escapeHtml(v.version);
            const isDownloadable = supportInfo.downloadable && v.asset_url;
            const cardClass = supportType === 'not_supported' ? 'not-supported-card' : '';
            
            return `
                <div class="version-card ${cardClass}">
                    <div class="version-info">
                        <div class="version-number">${versionDisplay}</div>
                        <div class="badges-group">
                            <span class="status-badge ${statusInfo.class}">
                                <i class="fas ${statusInfo.icon}"></i> ${statusInfo.label}
                            </span>
                            <span class="support-badge ${supportInfo.class} support-tooltip" title="${supportInfo.tooltip}">
                                <i class="fas ${supportInfo.icon}"></i> ${supportInfo.label}
                            </span>
                        </div>
                        <div class="version-meta">
                            ${formattedDate ? `<span><i class="fas fa-calendar-alt"></i> ${formattedDate}</span>` : ''}
                            <span><i class="fas fa-database"></i> ${sizeDisplay}</span>
                            <span><i class="fas fa-android"></i> Android 10+</span>
                        </div>
                    </div>
                    ${isDownloadable ? 
                        `<button class="download-btn download-single" data-url="${escapeHtml(v.asset_url)}" data-version="${versionDisplay}">
                            <i class="fas fa-download"></i> Descargar APK
                        </button>` :
                        `<button class="download-btn disabled-btn" disabled>
                            <i class="fas fa-ban"></i> No disponible
                        </button>`
                    }
                </div>
            `;
        }).join('');

        container.innerHTML = `<div class="versions-grid">${versionsHtml}</div>`;

        document.querySelectorAll('.download-single').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const url = btn.getAttribute('data-url');
                const versionName = btn.getAttribute('data-version');
                if (url && url !== '#' && (url.startsWith('http') || url.startsWith('https'))) {
                    showDownloadToast(versionName);
                    window.open(url, '_blank');
                } else {
                    showToast('⚠️ Enlace no disponible', true);
                }
            });
        });
    }

    async function loadVersionsFromServer() {
        const container = document.getElementById('versionsContainer');
        
        container.innerHTML = `
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Cargando versiones...</p>
            </div>
        `;
        
        try {
            const response = await fetch(VERSIONS_JSON_URL, {
                method: 'GET',
                headers: { 'Accept': 'application/json' },
                cache: 'no-cache'
            });
            
            if (!response.ok) {
                throw new Error(`Error ${response.status}`);
            }
            
            const data = await response.json();
            
            if (!Array.isArray(data)) {
                throw new Error('Formato inválido');
            }
            
            const validVersions = data.filter(item => 
                item.version && 
                item.status && 
                ['alpha', 'beta', 'preview', 'release'].includes(item.status) &&
                item.asset_url
            ).map(item => ({
                ...item,
                support_type: item.support_type && ['supported', 'missing_features', 'deprecated', 'not_supported'].includes(item.support_type) 
                    ? item.support_type 
                    : 'supported'
            }));
            
            renderVersions(validVersions);
            
        } catch (error) {
            console.error('Error:', error);
            
            container.innerHTML = `
                <div class="error-state">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2.5rem; color:#F97316; margin-bottom: 1rem;"></i>
                    <h3 style="font-size: 1.2rem;">Error al cargar</h3>
                    <p style="color: #A0A8B8; font-size: 0.85rem; margin-top: 0.5rem;">
                        No se pudo conectar con el servidor.
                    </p>
                    <button id="retryErrorBtn" class="download-btn retry-btn" style="margin-top: 1rem; width: auto; padding: 0.6rem 1.2rem;">
                        <i class="fas fa-sync-alt"></i> Reintentar
                    </button>
                </div>
            `;
            const retryBtn = document.getElementById('retryErrorBtn');
            if (retryBtn) {
                retryBtn.addEventListener('click', () => loadVersionsFromServer());
            }
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadVersionsFromServer();

        const backBtn = document.getElementById('backToHome');
        if (backBtn) {
            backBtn.addEventListener('click', (e) => {
                e.preventDefault();
                goToHomePage();
            });
        }

        const logoLink = document.getElementById('logoHomeLink');
        if (logoLink) {
            logoLink.addEventListener('click', (e) => {
                e.preventDefault();
                goToHomePage();
            });
        }

        const footerLinks = document.querySelectorAll('.footer-links a');
        footerLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                showToast(`🔐 ${link.innerText} — próximamente.`);
            });
        });
    });
</script>

</body>
</html>
