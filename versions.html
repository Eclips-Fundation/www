<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Versiones · Eclips Chat para Android</title>
    <meta name="description" content="Descarga todas las versiones de Eclips Chat: release, preview, beta y alpha. Cada versión tiene un nivel de soporte específico.">
    <!-- Google Fonts + Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0C10;
            color: #EFF3F8;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1E1F24;
        }
        ::-webkit-scrollbar-thumb {
            background: #F97316;
            border-radius: 8px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header - idéntico a index.html */
        .header {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
            position: sticky;
            top: 0;
            background: rgba(10, 12, 16, 0.98);
            backdrop-filter: blur(12px);
            z-index: 1000;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo a {
            font-size: 1.4rem;
            font-weight: 700;
            text-decoration: none;
            color: #fff;
            letter-spacing: -0.3px;
        }
        
        .logo .gradient-chat {
            background: linear-gradient(135deg, #FFB347, #F95A2C);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: #F97316;
            font-size: 1.6rem;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.8rem;
        }

        .nav-links a {
            color: #B9C1D1;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #F97316;
        }

        /* Page Header */
        .page-header {
            margin: 2rem 0 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: #A0A8B8;
            font-size: 0.9rem;
        }

        /* Tabla moderna */
        .versions-table-container {
            background: #12141C;
            border-radius: 20px;
            border: 1px solid #252A33;
            overflow-x: auto;
            margin-bottom: 2rem;
        }

        .versions-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 680px;
        }

        .versions-table th {
            text-align: left;
            padding: 1rem 1.2rem;
            background: #0F1117;
            color: #8B95A8;
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #252A33;
        }

        .versions-table td {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid #1E2129;
            font-size: 0.85rem;
            vertical-align: middle;
        }

        .versions-table tr:last-child td {
            border-bottom: none;
        }

        .versions-table tr:hover td {
            background: rgba(249, 115, 22, 0.05);
        }

        /* Columna versión */
        .version-cell {
            font-weight: 700;
            font-size: 1rem;
            color: #FFB347;
        }

        /* Badges */
        .status-badge, .support-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-release {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.25);
        }
        .status-preview {
            background: rgba(249, 115, 22, 0.15);
            color: #F97316;
            border: 1px solid rgba(249, 115, 22, 0.25);
        }
        .status-beta {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            border: 1px solid rgba(192, 132, 252, 0.25);
        }
        .status-alpha {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.25);
        }

        .support-supported {
            background: rgba(34, 197, 94, 0.12);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .support-missing_features {
            background: rgba(249, 115, 22, 0.12);
            color: #F97316;
            border: 1px solid rgba(249, 115, 22, 0.2);
        }
        .support-deprecated {
            background: rgba(245, 158, 11, 0.12);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        .support-not_supported {
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        /* Meta información */
        .meta-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.75rem;
            color: #8B95A8;
        }

        .meta-info i {
            color: #F97316;
            width: 14px;
        }

        /* Botón descarga */
        .download-table-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 1rem;
            background: linear-gradient(105deg, #F97316, #FF8C42);
            border-radius: 40px;
            color: #0A0C10;
            font-weight: 600;
            font-size: 0.75rem;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .download-table-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .download-table-btn.disabled-btn {
            background: #2A2E3A;
            color: #6A7287;
            cursor: not-allowed;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Loading & Empty states */
        .loading-state, .empty-state, .error-state {
            text-align: center;
            padding: 3rem;
            background: #12141C;
            border-radius: 20px;
            border: 1px solid #252A33;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #252A33;
            border-top-color: #F97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer - idéntico a index.html */
        .footer {
            border-top: 1px solid rgba(249, 115, 22, 0.2);
            padding: 1.5rem 0;
            margin-top: 2rem;
        }

        .footer-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #9a9aa4;
            text-decoration: none;
            font-size: 0.75rem;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #F97316;
        }

        .copyright {
            font-size: 0.7rem;
            color: #7F8899;
        }

        /* Responsive */
        @media (max-width: 780px) {
            .container {
                padding: 0 1rem;
            }
            .menu-toggle {
                display: block;
            }
            .nav {
                position: relative;
            }
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(10, 12, 16, 0.98);
                backdrop-filter: blur(12px);
                padding: 1rem;
                gap: 1rem;
                border-bottom: 1px solid rgba(249, 115, 22, 0.2);
                z-index: 999;
            }
            .nav-links.show {
                display: flex;
            }
            .page-header h1 {
                font-size: 1.6rem;
            }
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
            .meta-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.3rem;
            }
        }

        @media (max-width: 480px) {
            .page-header h1 {
                font-size: 1.4rem;
            }
            .status-badge, .support-badge {
                font-size: 0.6rem;
                padding: 0.2rem 0.6rem;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <div class="nav">
            <div class="logo">
                <a href="index.html">Eclips <span class="gradient-chat">Chat</span></a>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="Menú">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="versions.html">Descargas</a>
                <a href="#">Soporte</a>
                <a href="privacy.html">Privacidad</a>
                <a href="terms.html">Términos</a>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-download" style="color:#F97316; margin-right: 0.6rem;"></i> Versiones</h1>
            <p>Descarga cualquier versión de Eclips Chat. Cada versión tiene un nivel de soporte indicado.</p>
        </div>

        <div id="versionsContainer">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Cargando versiones...</p>
            </div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <div class="footer-content">
            <div class="copyright">
                <i class="far fa-copyright"></i> 2025 Eclips Chat · Cifrado AES-256 · Claves por QR
            </div>
            <div class="footer-links">
                <a href="privacy.html">Política de Privacidad</a>
                <a href="terms.html">Términos de Servicio</a>
                <a href="versions.html">Descargas</a>
                <a href="#">Soporte</a>
            </div>
        </div>
    </div>
</footer>

<script>
    // ============================================================
    // MENÚ HAMBURGUESA
    // ============================================================
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    
    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('show');
            const icon = menuToggle.querySelector('i');
            if (navLinks.classList.contains('show')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        });
    }
    
    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
            navLinks.classList.remove('show');
            if (menuToggle) {
                const icon = menuToggle.querySelector('i');
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        });
    });

    // ============================================================
    // CARGA DE VERSIONES DESDE JSON
    // ============================================================
    const VERSIONS_JSON_URL = './versions.json';
    
    function getStatusInfo(status) {
        const statusMap = {
            release: { class: 'status-release', icon: 'fa-check-circle', label: 'Release' },
            preview: { class: 'status-preview', icon: 'fa-eye', label: 'Preview' },
            beta: { class: 'status-beta', icon: 'fa-flask', label: 'Beta' },
            alpha: { class: 'status-alpha', icon: 'fa-code-branch', label: 'Alpha' }
        };
        return statusMap[status] || { class: 'status-preview', icon: 'fa-tag', label: status };
    }

    function getSupportInfo(supportType) {
        const supportMap = {
            supported: {
                class: 'support-supported',
                icon: 'fa-check-circle',
                label: 'Soportado',
                tooltip: 'Versión completamente soportada',
                downloadable: true
            },
            missing_features: {
                class: 'support-missing_features',
                icon: 'fa-star-of-life',
                label: 'Limitado',
                tooltip: 'Funcionalidades limitadas vs versiones recientes',
                downloadable: true
            },
            deprecated: {
                class: 'support-deprecated',
                icon: 'fa-exclamation-triangle',
                label: 'Obsoleto',
                tooltip: 'Puede romperse en el futuro. Sin soporte.',
                downloadable: true
            },
            not_supported: {
                class: 'support-not_supported',
                icon: 'fa-times-circle',
                label: 'No soportado',
                tooltip: 'Versión no compatible',
                downloadable: false
            }
        };
        return supportMap[supportType] || supportMap.not_supported;
    }

    function formatDate(dateString) {
        if (!dateString) return null;
        try {
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return null;
            return date.toLocaleDateString('es-ES', { year: 'numeric', month: 'short', day: 'numeric' });
        } catch (e) {
            return null;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(message, isError = false) {
        const existingToast = document.querySelector('.custom-toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = isError ? '#DC2626' : '#F97316';
        toast.style.color = '#0A0C10';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '40px';
        toast.style.fontWeight = '500';
        toast.style.fontSize = '0.8rem';
        toast.style.zIndex = '10000';
        toast.style.backdropFilter = 'blur(8px)';
        toast.style.maxWidth = '85%';
        toast.style.textAlign = 'center';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function renderVersionsTable(versions) {
        const container = document.getElementById('versionsContainer');
        
        if (!versions || versions.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open" style="font-size: 2.5rem; color:#F97316; margin-bottom: 1rem;"></i>
                    <h3 style="font-size: 1.2rem;">No hay versiones</h3>
                    <p style="color: #A0A8B8;">Pronto habrá versiones disponibles.</p>
                    <button id="retryEmptyBtn" class="download-table-btn retry-btn" style="margin-top: 1rem; background: rgba(249,115,22,0.2); color:#F97316;">
                        <i class="fas fa-sync-alt"></i> Reintentar
                    </button>
                </div>
            `;
            const retryBtn = document.getElementById('retryEmptyBtn');
            if (retryBtn) retryBtn.addEventListener('click', () => loadVersions());
            return;
        }

        // Ordenar: release primero, luego preview, beta, alpha
        const statusOrder = { release: 0, preview: 1, beta: 2, alpha: 3 };
        const sortedVersions = [...versions].sort((a, b) => {
            const orderDiff = statusOrder[a.status] - statusOrder[b.status];
            if (orderDiff !== 0) return orderDiff;
            return b.version.localeCompare(a.version, undefined, { numeric: true });
        });

        const tableRows = sortedVersions.map(v => {
            const statusInfo = getStatusInfo(v.status);
            const supportType = v.support_type || 'supported';
            const supportInfo = getSupportInfo(supportType);
            const formattedDate = v.release_date ? formatDate(v.release_date) : '—';
            const sizeDisplay = v.size_mb ? `${v.size_mb} MB` : '—';
            const versionDisplay = escapeHtml(v.version);
            const isDownloadable = supportInfo.downloadable && v.asset_url;
            
            return `
                <tr>
                    <td class="version-cell">${versionDisplay}</td>
                    <td>
                        <span class="status-badge ${statusInfo.class}">
                            <i class="fas ${statusInfo.icon}"></i> ${statusInfo.label}
                        </span>
                    </td>
                    <td>
                        <span class="support-badge ${supportInfo.class}" title="${supportInfo.tooltip}">
                            <i class="fas ${supportInfo.icon}"></i> ${supportInfo.label}
                        </span>
                    </td>
                    <td>
                        <div class="meta-info">
                            <span><i class="fas fa-calendar-alt"></i> ${formattedDate}</span>
                            <span><i class="fas fa-database"></i> ${sizeDisplay}</span>
                            <span><i class="fas fa-android"></i> 10+</span>
                        </div>
                    </td>
                    <td>
                        ${isDownloadable ? 
                            `<button class="download-table-btn" data-url="${escapeHtml(v.asset_url)}" data-version="${versionDisplay}">
                                <i class="fas fa-download"></i> APK
                            </button>` :
                            `<button class="download-table-btn disabled-btn" disabled>
                                <i class="fas fa-ban"></i> No disponible
                            </button>`
                        }
                    </td>
                </tr>
            `;
        }).join('');

        container.innerHTML = `
            <div class="versions-table-container">
                <table class="versions-table">
                    <thead>
                        <tr>
                            <th>Versión</th>
                            <th>Estado</th>
                            <th>Soporte</th>
                            <th>Información</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableRows}
                    </tbody>
                </table>
            </div>
        `;

        // Event listeners para botones de descarga
        document.querySelectorAll('.download-table-btn[data-url]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const url = btn.getAttribute('data-url');
                const versionName = btn.getAttribute('data-version');
                if (url && (url.startsWith('http') || url.startsWith('https'))) {
                    showToast(`📲 Descargando Eclips Chat ${versionName}`);
                    window.open(url, '_blank');
                } else {
                    showToast('⚠️ Enlace no disponible', true);
                }
            });
        });
    }

    async function loadVersions() {
        const container = document.getElementById('versionsContainer');
        
        container.innerHTML = `
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Cargando versiones...</p>
            </div>
        `;
        
        try {
            const response = await fetch(VERSIONS_JSON_URL, {
                method: 'GET',
                headers: { 'Accept': 'application/json' },
                cache: 'no-cache'
            });
            
            if (!response.ok) {
                throw new Error(`Error ${response.status}`);
            }
            
            const data = await response.json();
            
            if (!Array.isArray(data)) {
                throw new Error('Formato inválido');
            }
            
            const validVersions = data.filter(item => 
                item.version && 
                item.status && 
                ['alpha', 'beta', 'preview', 'release'].includes(item.status) &&
                item.asset_url
            ).map(item => ({
                ...item,
                support_type: item.support_type && ['supported', 'missing_features', 'deprecated', 'not_supported'].includes(item.support_type) 
                    ? item.support_type 
                    : 'supported'
            }));
            
            renderVersionsTable(validVersions);
            
        } catch (error) {
            console.error('Error:', error);
            
            container.innerHTML = `
                <div class="error-state">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2.5rem; color:#F97316; margin-bottom: 1rem;"></i>
                    <h3 style="font-size: 1.2rem;">Error al cargar</h3>
                    <p style="color: #A0A8B8;">No se pudo conectar con el servidor.</p>
                    <button id="retryErrorBtn" class="download-table-btn retry-btn" style="margin-top: 1rem; background: rgba(249,115,22,0.2); color:#F97316;">
                        <i class="fas fa-sync-alt"></i> Reintentar
                    </button>
                </div>
            `;
            const retryBtn = document.getElementById('retryErrorBtn');
            if (retryBtn) {
                retryBtn.addEventListener('click', () => loadVersions());
            }
        }
    }

    // Footer links
    document.querySelectorAll('.footer-links a').forEach(link => {
        if (link.getAttribute('href') === '#') {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                showToast('📄 Próximamente disponible');
            });
        }
    });

    // Iniciar carga
    loadVersions();
</script>
</body>
</html>
